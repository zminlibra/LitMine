services:
  # ── PostgreSQL 16 + pgvector ──
  postgres:
    image: pgvector/pgvector:pg16
    container_name: litmine-postgres
    environment:
      POSTGRES_USER: litmine
      POSTGRES_PASSWORD: litmine_dev
      POSTGRES_DB: litmine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litmine"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - litmine-net

  # ── Redis 7 (Cache + Message Queue) ──
  redis:
    image: redis:7-alpine
    container_name: litmine-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
    networks:
      - litmine-net

  # ── GROBID (PDF → TEI XML extraction) ──
  grobid:
    image: lfoppiano/grobid:0.8.1
    container_name: litmine-grobid
    ports:
      - "8070:8070"
    environment:
      JAVA_OPTS: "-Xmx2g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - litmine-net

  # ── API Server (FastAPI + Uvicorn) ──
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: litmine-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://litmine:litmine_dev@postgres:5432/litmine"
      DATABASE_URL_SYNC: "postgresql://litmine:litmine_dev@postgres:5432/litmine"
      REDIS_URL: "redis://redis:6379/0"
      GROBID_URL: "http://grobid:8070"
      CORS_ORIGINS: '["http://localhost:3000"]'
      SECRET_KEY: "dev-secret-key-change-in-production"
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - litmine-net

  # ── Arq Worker (Background job queue) ──
  arq-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: litmine-arq-worker
    command: python -m arq app.workers.worker.WorkerSettings
    environment:
      DATABASE_URL: "postgresql+asyncpg://litmine:litmine_dev@postgres:5432/litmine"
      DATABASE_URL_SYNC: "postgresql://litmine:litmine_dev@postgres:5432/litmine"
      REDIS_URL: "redis://redis:6379/0"
      GROBID_URL: "http://grobid:8070"
      SECRET_KEY: "dev-secret-key-change-in-production"
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - litmine-net

networks:
  litmine-net:
    name: litmine-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
